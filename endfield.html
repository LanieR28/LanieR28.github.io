<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ENDFIELD | LanieRの個人サイト</title>
    <meta
      name="description"
      content="終末地向けツール置き場。攒抽計算機をはじめとした ENDFIELD 関連ページの準備中画面です。"
    />
    <link rel="icon" type="image/png" href="./assets/lr-web-icon.png" />
    <link rel="apple-touch-icon" href="./assets/lr-web-icon.png" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./site.js" defer></script>
  </head>
  <body class="endfield-page endfield-gacha-page">
    <div class="site-shell">
      <header class="hero" id="top">
        <div class="nav-region" id="nav-region">
          <nav class="topbar">
            <div class="topbar-inner">
              <a class="brand" href="./index.html" aria-label="LanieR ホーム">
                <img
                  src="./assets/lr-logo.png"
                  data-light="./assets/lr-logo.png"
                  data-dark="./assets/lr-logo-dark.png"
                  alt="LR"
                />
              </a>

              <div class="nav-links">
                <a class="nav-trigger" data-menu="home" href="./index.html">ホーム</a>
                <a class="nav-trigger" data-menu="archive" href="./projects.html">作品</a>
                <a class="nav-trigger" data-menu="blog" href="./index.html#top">ブログ</a>
                <a class="nav-trigger" data-menu="projects" href="./projects.html#chunithm-bot">プロジェクト</a>
                <a class="nav-trigger" data-menu="endfield" href="./endfield.html">ENDFIELD</a>
                <a class="nav-trigger" data-menu="about" href="./index.html#top">私について</a>
                <a class="nav-trigger" data-menu="videos" href="./index.html#videos">動画</a>
              </div>

              <div class="nav-actions">
                <form class="search-box" id="site-search-form">
                  <input id="site-search-input" type="search" placeholder="サイト内検索" />
                  <button class="icon-button search-button" type="submit" aria-label="検索">
                    <img
                      src="./assets/search-icon.png"
                      data-light="./assets/search-icon.png"
                      data-dark="./assets/search-icon-dark.png"
                      alt="検索"
                    />
                  </button>
                </form>

                <button class="icon-button theme-toggle" id="theme-toggle" type="button" aria-label="表示モード切替">
                  <span class="theme-icon" aria-hidden="true">☀︎</span>
                </button>
              </div>
            </div>
          </nav>

          <div class="nav-mega" id="nav-mega" aria-hidden="true">
            <div class="nav-mega-inner">
              <section class="mega-panel" data-panel="endfield">
                <div class="mega-column mega-column-primary">
                  <p class="mega-label">ENDFIELD</p>
                  <a href="./endfield.html">攒抽計算器</a>
                </div>
                <div class="mega-column">
                  <p class="mega-label">紹介ページ</p>
                  <a href="./endfield.html">終末地ツール置き場</a>
                </div>
                <div class="mega-column">
                  <p class="mega-label">関連ページ</p>
                  <a href="./projects.html">作品ページ</a>
                  <a href="./index.html#top">私について</a>
                </div>
              </section>
            </div>
          </div>
        </div>

        <div class="hero-grid">
          <div class="hero-copy" data-search="ENDFIELD 終末地 攒抽計算機 gacha">
            <h1>攒抽計算器</h1>
          </div>
        </div>
      </header>

      <main class="endfield-main" id="gacha-calculator">
        <section class="endfield-section">
          <div class="endfield-section-head">
            <p class="eyebrow">CALCULATOR</p>
          </div>

          <div class="gacha-layout">
            <section class="gacha-card gacha-card-primary gacha-toolbar-card">
              <div class="gacha-toolbar-shell">
                <div class="gacha-toolbar-column">
                  <div class="gacha-toolbar-group">
                    <span class="gacha-label">选择卡池</span>
                    <div class="gacha-pill-row" id="gacha-selector">
                      <button class="gacha-pill-button gacha-pool-button" type="button" data-gacha-key="currentGacha">
                        <span>庄方宜卡池</span>
                        <strong>4/17~5/22</strong>
                      </button>
                      <button class="gacha-pill-button gacha-pill-button-secondary gacha-pool-button" type="button" data-gacha-key="nextGacha">
                        <span>辉光庆时卡池</span>
                        <strong>5/14~6/5</strong>
                      </button>
                    </div>
                  </div>

                  <div class="gacha-toolbar-group">
                    <span class="gacha-label">结算模式</span>
                    <div class="gacha-mode-row">
                      <div class="gacha-pill-row" id="gacha-mode-selector">
                        <button class="gacha-pill-button gacha-pill-button-secondary" type="button" data-gacha-mode="release">开始日</button>
                        <button class="gacha-pill-button" type="button" data-gacha-mode="end">结束日</button>
                      </div>
                      <span class="gacha-days-badge" id="gacha-days-badge">0天</span>
                    </div>
                  </div>
                </div>

                <aside class="gacha-inventory-panel" aria-label="库存">
                  <span class="gacha-label">库存</span>
                  <div class="gacha-inventory-row">
                    <label class="gacha-inventory-item">
                      <span class="visually-hidden">至纯源石</span>
                      <img src="./assets/endfield/originium.webp" alt="" />
                      <input id="gacha-current-originium" type="number" min="0" step="1" value="0" inputmode="numeric" />
                    </label>
                    <label class="gacha-inventory-item">
                      <span class="visually-hidden">合成玉</span>
                      <img src="./assets/endfield/synthetic-jade.webp" alt="" />
                      <input id="gacha-current-currency" type="number" min="0" step="1" value="0" inputmode="numeric" />
                    </label>
                    <label class="gacha-inventory-item">
                      <span class="visually-hidden">限定抽</span>
                      <img src="./assets/endfield/limited-pull.webp" alt="" />
                      <input id="gacha-current-featured-permits" type="number" min="0" step="1" value="0" inputmode="numeric" />
                    </label>
                    <label class="gacha-inventory-item">
                      <span class="visually-hidden">武器配额</span>
                      <img src="./assets/endfield/weapon-quota.webp" alt="" />
                      <input id="gacha-current-weapon-quota" type="number" min="0" step="1" value="0" inputmode="numeric" />
                    </label>
                  </div>
                </aside>
              </div>
            </section>

            <section class="gacha-hero-panels">
              <article class="gacha-hero-card gacha-hero-card-character">
                <div class="gacha-hero-card-head">
                  <div>
                    <p class="eyebrow">CHARACTER</p>
                    <h3>寻访次数</h3>
                  </div>
                </div>

                <div class="gacha-source-module">
                  <strong class="gacha-source-total" id="gacha-character-total-pulls">0 抽</strong>

                  <div class="gacha-source-progress" aria-label="资源来源分布">
                    <span class="gacha-source-segment gacha-source-segment-inventory" id="gacha-source-inventory-bar"></span>
                    <span class="gacha-source-segment gacha-source-segment-daily" id="gacha-source-daily-bar"></span>
                    <span class="gacha-source-segment gacha-source-segment-event" id="gacha-source-event-bar"></span>
                    <span class="gacha-source-segment gacha-source-segment-paid" id="gacha-source-paid-bar"></span>
                  </div>

                  <div class="gacha-source-legend">
                    <span><i class="gacha-source-dot gacha-source-segment-inventory"></i>库存 <strong id="gacha-source-inventory-share">0%</strong></span>
                    <span><i class="gacha-source-dot gacha-source-segment-daily"></i>日常 <strong id="gacha-source-daily-share">0%</strong></span>
                    <span><i class="gacha-source-dot gacha-source-segment-event"></i>活动 <strong id="gacha-source-event-share">0%</strong></span>
                    <span><i class="gacha-source-dot gacha-source-segment-paid"></i>氪金 <strong id="gacha-source-paid-share">0%</strong></span>
                  </div>
                </div>

                <div class="gacha-inline-weapon">
                  <div class="gacha-hero-card-head gacha-hero-card-head-weapon">
                    <div>
                      <p class="eyebrow">WEAPON</p>
                      <h3>武库配额</h3>
                    </div>
                  </div>
                </div>
              </article>
            </section>

            <details class="gacha-accordion">
              <summary class="gacha-accordion-summary">计算详情</summary>

              <div class="gacha-accordion-body">
                <section class="gacha-card">
                  <div class="gacha-card-head">
                    <h3>预计收入</h3>
                    <p>第一版先用固定日常 / 周常，再给活动留手动补录入口。</p>
                  </div>

                  <div class="gacha-rate-grid">
                    <article class="gacha-rate-item">
                      <span>日常固定</span>
                      <strong>200 / 天</strong>
                    </article>
                    <article class="gacha-rate-item">
                      <span>周常固定</span>
                      <strong>500 / 周</strong>
                    </article>
                  </div>

                  <div class="gacha-form-grid">
                    <label class="gacha-field">
                      <span>活动额外货币</span>
                      <input id="gacha-event-currency" type="number" min="0" step="1" value="0" />
                    </label>
                    <label class="gacha-field">
                      <span>活动额外特许凭证</span>
                      <input id="gacha-event-featured-permits" type="number" min="0" step="1" value="0" />
                    </label>
                  </div>
                </section>
              </div>
            </details>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
