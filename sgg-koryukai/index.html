<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SGG交流会 | Theme Rotation Activity</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e1ec;
      --accent: #f0b429;
      --accent-soft: #fff7d7;
      --done: #e6e9ef;
      --done-ink: #8b95a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Aptos, "Yu Gothic", "Hiragino Sans", Meiryo, system-ui, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 28px 34px 34px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 170px 1fr auto;
      gap: 20px;
      align-items: center;
    }

    .status h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .countries {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
    }

    .country {
      height: 74px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.55);
      padding: 0;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .country.active {
      background: var(--accent-soft);
      border: 3px solid var(--accent);
      box-shadow: 0 8px 22px rgba(240, 180, 41, 0.14);
    }

    .country:not(.active) img {
      opacity: 0.33;
      filter: saturate(0.75);
    }

    .country img {
      width: 104px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .controls button {
      height: 40px;
    }

    button.primary {
      border-color: #c99716;
      background: var(--accent);
      color: #1f2937;
    }

    button:focus-visible,
    .topic:focus-visible,
    .country:focus-visible {
      outline: 3px solid rgba(240, 180, 41, 0.45);
      outline-offset: 2px;
    }

    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .topic {
      height: auto;
      min-height: 0;
      border: 1px solid #cbd6e2;
      background: var(--panel);
      display: grid;
      place-items: center;
      position: relative;
      color: var(--ink);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 120ms ease;
      user-select: none;
      padding: 16px;
    }

    .topic:hover {
      border-color: #9fb0c4;
      transform: translateY(-1px);
    }

    .topic.done {
      background: #d8dde6;
      border-color: #a8b0bd;
      color: #6f7a89;
      box-shadow: inset 0 0 0 999px rgba(96, 108, 126, 0.08);
    }

    .topic.spotlight {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(240, 180, 41, 0.25), inset 0 0 0 999px rgba(240, 180, 41, 0.08);
    }

    .topic.done::after {
      content: "済";
      position: absolute;
      top: 12px;
      right: 14px;
      width: 38px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #a2abb8;
      color: #697386;
      font-size: 16px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.58);
    }

    .topic span {
      display: block;
      text-align: center;
      font-size: clamp(24px, 2.35vw, 34px);
      line-height: 1.16;
      font-weight: 800;
      letter-spacing: 0;
    }

    .question-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 42px;
      background: rgba(12, 18, 28, 0.42);
      backdrop-filter: blur(12px);
    }

    .question-overlay[hidden] {
      display: none;
    }

    .question-card {
      width: min(1040px, 92vw);
      min-height: min(560px, 78vh);
      padding: clamp(34px, 5vw, 70px);
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
      background: rgba(255, 255, 255, 0.96);
      border: 4px solid var(--accent);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.34);
    }

    .question-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .question-country {
      display: flex;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
    }

    .question-country img {
      width: 86px;
      height: 48px;
      object-fit: contain;
    }

    .question-theme {
      color: #9a6a00;
      font-size: clamp(22px, 2.4vw, 34px);
      font-weight: 900;
      text-align: right;
    }

    .question-text {
      margin: 0;
      align-self: center;
      color: var(--ink);
      font-size: clamp(42px, 6vw, 82px);
      line-height: 1.14;
      font-weight: 900;
      letter-spacing: 0;
      text-align: center;
    }

    .question-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .question-actions button {
      min-width: 150px;
      height: 48px;
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .app {
        padding: 18px;
        gap: 18px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .countries {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(6, minmax(110px, 1fr));
      }

      .question-overlay {
        padding: 18px;
      }

      .question-card {
        min-height: 72vh;
        padding: 28px 22px;
      }

      .question-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .question-theme {
        text-align: left;
      }

      .question-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="topbar" aria-label="country rotation">
      <div class="status">
        <h1>現在の国</h1>
        <p id="progressText">0 / 12</p>
      </div>
      <div class="countries" id="countries"></div>
      <div class="controls">
        <button class="primary" id="nextButton" type="button">次の国</button>
        <button id="resetCountryButton" type="button">この国をリセット</button>
        <button id="resetAllButton" type="button">全リセット</button>
        <button id="fullscreenButton" type="button">全画面</button>
      </div>
    </section>

    <section class="grid" id="themeGrid" aria-label="themes"></section>
  </main>

  <section class="question-overlay" id="questionOverlay" hidden aria-live="polite">
    <div class="question-card" role="dialog" aria-modal="true" aria-labelledby="questionText">
      <div class="question-meta">
        <div class="question-country">
          <img id="questionFlag" src="../assets/flags/us.png" alt="">
          <span id="questionCountry">United States</span>
        </div>
        <div class="question-theme" id="questionTheme">お祭り/祝日</div>
      </div>
      <p class="question-text" id="questionText">質問をここに表示します。</p>
      <div class="question-actions">
        <button class="primary" id="closeQuestionButton" type="button">閉じる</button>
        <button id="questionNextButton" type="button">次の国へ</button>
      </div>
    </div>
  </section>

  <script>
    const themes = [

    const questionBank = {

          answer: false,

          text: "アメリカでは、テレビでスポーツの試合中に流れるCMにはタバコの広告が多い。",
          answer: false,

      },
      china: {
        0: {
          text: "中国では祝日のために平日を週末に移動させて連休を作ることがある。",
          answer: true,
        },
        1: {
          text: "中国の一般家庭にはバスタブがあるのが普通だ。",
          answer: false,
        },
        2: {
          text: "上海の共享自転車の登録台数は100万台を超えている。",
          answer: true,
        },
        3: {
          text: "中国ではeスポーツが正式な大学の専攻として存在する。",
          answer: true,
        },
        4: {

        5: {

      austria: {
        0: {

        },
        1: [

          {

            answer: false,
          },
        ],
      },
      spain: {
        0: {
          text: "12月31日にカウントダウンの時にスペイン人が12個葡萄を食べる伝統がある。",
          answer: true,
        },
        1: {
          text: "お風呂とトイレは別の部屋にある。",
          answer: false,
        },
        2: {
          text: "毎日スペイン人がバスや車で学校/仕事に行く。",
          answer: true,
        },
        3: {
          text: "ビーチで日光浴すること苦手な人が多い。",
          answer: true,
        },
        4: {
          text: "夏は寒い。冬は暑い。",
          answer: false,
        },
        5: {
          text: "毎日シエスタ(昼寝)をする人が多い。",
          answer: false,
        },

          text: "バルセロナはスペインの首都。",
          answer: false,
        },
        7: {
          text: "授業は午後の３時に終わる。",
          answer: false,
        },
        8: {
          text: "ワインがビールより方が飲む。",
          answer: false,
        },
        9: {
          text: "ZARAという人気なアパレル店はスペインの企業。",
          answer: true,
        },
        10: {
          text: "洪水と猛暑は一番行っている自然災害。",
          answer: true,
        },
        11: {
          text: "闘牛はスペインの人気スポーツ。",
          answer: false,
        },
      },
    };

    const storageKey = "theme-rotation-activity-v1";
    let activeCountry = 0;
    let selections = loadSelections();
    let activeQuestion = null;

    const countriesEl = document.getElementById("countries");
    const gridEl = document.getElementById("themeGrid");
    const progressText = document.getElementById("progressText");
    const questionOverlay = document.getElementById("questionOverlay");
    const questionFlag = document.getElementById("questionFlag");
    const questionCountry = document.getElementById("questionCountry");
    const questionTheme = document.getElementById("questionTheme");
    const questionText = document.getElementById("questionText");

    function emptySelections() {
      return Object.fromEntries(countries.map((country) => [country.key, []]));
    }

    function loadSelections() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey));
        const base = emptySelections();
        for (const country of countries) {
          if (Array.isArray(parsed?.[country.key])) {
            base[country.key] = parsed[country.key].filter((value) => Number.isInteger(value));
          }
        }
        return base;
      } catch {
        return emptySelections();
      }
    }

    function saveSelections() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(selections));
      } catch {
        // Keep the live screen usable even if storage is blocked.
      }
    }

    function currentKey() {
      return countries[activeCountry].key;
    }

    function isDone(themeIndex) {
      return selections[currentKey()].includes(themeIndex);
    }

    function toggleTheme(themeIndex) {
      const key = currentKey();
      const selected = new Set(selections[key]);
      if (selected.has(themeIndex)) {
        selected.delete(themeIndex);
        activeQuestion = null;
      } else {
        selected.add(themeIndex);
        activeQuestion = {
          countryIndex: activeCountry,
          themeIndex,
          questionIndex: pickQuestionIndex(key, themeIndex),
        };
      }
      selections[key] = Array.from(selected).sort((a, b) => a - b);
      render();
      saveSelections();
    }

    function getQuestionEntry(countryKey, themeIndex) {
      const entry = questionBank[countryKey]?.[themeIndex] || questionBank.default[themeIndex];
      if (Array.isArray(entry)) {
        return entry;
      }
      return [entry];
    }

    function pickQuestionIndex(countryKey, themeIndex) {
      const entries = getQuestionEntry(countryKey, themeIndex);
      return Math.floor(Math.random() * entries.length);
    }

    function getQuestion(countryKey, themeIndex, questionIndex = 0) {
      const entries = getQuestionEntry(countryKey, themeIndex);
      const entry = entries[questionIndex] || entries[0];
      return typeof entry === "string" ? entry : entry.text;
    }

    function hideQuestion() {
      activeQuestion = null;
      render();
    }

    function handleThemePick(event) {
      const topicButton = event.target.closest(".topic");
      if (!topicButton || !gridEl.contains(topicButton)) {
        return;
      }
      const themeIndex = Number(topicButton.dataset.index);
      if (!Number.isInteger(themeIndex)) {
        return;
      }
      toggleTheme(themeIndex);
    }

    function setCountry(index) {
      activeCountry = ((index % countries.length) + countries.length) % countries.length;
      activeQuestion = null;
      render();
    }

    function nextCountry() {
      setCountry(activeCountry + 1);
    }

    function resetCountry() {
      selections[currentKey()] = [];
      render();
      saveSelections();
    }

    function resetAll() {
      selections = emptySelections();
      render();
      saveSelections();
    }

    function renderCountries() {
      countriesEl.replaceChildren();
      countries.forEach((country, index) => {
        const button = document.createElement("button");
        button.className = `country${index === activeCountry ? " active" : ""}`;
        button.type = "button";
        button.setAttribute("aria-label", country.name);
        button.addEventListener("click", () => setCountry(index));

        const img = document.createElement("img");
        img.src = country.flag;
        img.alt = `${country.name} flag`;
        button.append(img);
        countriesEl.append(button);
      });
    }

    function renderGrid() {
      gridEl.replaceChildren();
      themes.forEach((theme, index) => {
        const button = document.createElement("button");
        const isSpotlight =
          activeQuestion?.countryIndex === activeCountry && activeQuestion?.themeIndex === index;
        button.className = `topic${isDone(index) ? " done" : ""}${isSpotlight ? " spotlight" : ""}`;
        button.type = "button";
        button.dataset.index = String(index);
        button.setAttribute("aria-pressed", String(isDone(index)));

        const label = document.createElement("span");
        label.textContent = theme;
        button.append(label);
        gridEl.append(button);
      });
    }

    function renderProgress() {
      const count = selections[currentKey()].length;
      progressText.textContent = `${count} / ${themes.length}`;
    }

    function renderQuestion() {
      if (!activeQuestion) {
        questionOverlay.hidden = true;
        return;
      }

      const country = countries[activeQuestion.countryIndex];
      const theme = themes[activeQuestion.themeIndex];
      questionFlag.src = country.flag;
      questionFlag.alt = `${country.name} flag`;
      questionCountry.textContent = country.name;
      questionTheme.textContent = theme;
      questionText.textContent = getQuestion(country.key, activeQuestion.themeIndex, activeQuestion.questionIndex);
      questionOverlay.hidden = false;
    }

    function render() {
      renderCountries();
      renderGrid();
      renderProgress();
      renderQuestion();
    }

    document.getElementById("nextButton").addEventListener("click", nextCountry);
    document.getElementById("resetCountryButton").addEventListener("click", resetCountry);
    document.getElementById("resetAllButton").addEventListener("click", resetAll);
    gridEl.addEventListener("click", handleThemePick);
    document.getElementById("closeQuestionButton").addEventListener("click", hideQuestion);
    document.getElementById("questionNextButton").addEventListener("click", nextCountry);
    questionOverlay.addEventListener("click", (event) => {
      if (event.target === questionOverlay) {
        hideQuestion();
      }
    });
    document.getElementById("fullscreenButton").addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        nextCountry();
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        setCountry(activeCountry - 1);
      }
      if (["1", "2", "3", "4"].includes(event.key)) {
        setCountry(Number(event.key) - 1);
      }
      if (event.key.toLowerCase() === "r") {
        resetCountry();
      }
      if (event.key === "Escape") {
        hideQuestion();
      }
    });

    render();
  </script>
</body>
</html>
