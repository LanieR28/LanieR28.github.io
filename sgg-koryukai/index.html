<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SGG交流会 | Theme Rotation Activity</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #667085;
      --line: #d8e1ec;
      --accent: #f0b429;
      --accent-soft: #fff7d7;
      --done: #e6e9ef;
      --done-ink: #8b95a5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Aptos, "Yu Gothic", "Hiragino Sans", Meiryo, system-ui, sans-serif;
    }

    .app {
      min-height: 100vh;
      padding: 28px 34px 34px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 26px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 170px 1fr auto;
      gap: 20px;
      align-items: center;
    }

    .status h1 {
      margin: 0;
      font-size: 25px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .status p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
    }

    .countries {
      display: grid;
      grid-template-columns: repeat(4, minmax(120px, 1fr));
      gap: 16px;
    }

    .country {
      height: 74px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.55);
      padding: 0;
      display: grid;
      place-items: center;
      position: relative;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
    }

    .country.active {
      background: var(--accent-soft);
      border: 3px solid var(--accent);
      box-shadow: 0 8px 22px rgba(240, 180, 41, 0.14);
    }

    .country:not(.active) img {
      opacity: 0.33;
      filter: saturate(0.75);
    }

    .country img {
      width: 104px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
      padding: 0 14px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .controls button {
      height: 40px;
    }

    button.primary {
      border-color: #c99716;
      background: var(--accent);
      color: #1f2937;
    }

    button:focus-visible,
    .topic:focus-visible,
    .country:focus-visible {
      outline: 3px solid rgba(240, 180, 41, 0.45);
      outline-offset: 2px;
    }

    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .topic {
      height: auto;
      min-height: 0;
      border: 1px solid #cbd6e2;
      background: var(--panel);
      display: grid;
      place-items: center;
      position: relative;
      color: var(--ink);
      cursor: pointer;
      touch-action: manipulation;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease, transform 120ms ease;
      user-select: none;
      padding: 16px;
    }

    .topic:hover {
      border-color: #9fb0c4;
      transform: translateY(-1px);
    }

    .topic.done {
      background: #d8dde6;
      border-color: #a8b0bd;
      color: #6f7a89;
      box-shadow: inset 0 0 0 999px rgba(96, 108, 126, 0.08);
    }

    .topic.spotlight {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(240, 180, 41, 0.25), inset 0 0 0 999px rgba(240, 180, 41, 0.08);
    }

    .topic.done::after {
      content: "済";
      position: absolute;
      top: 12px;
      right: 14px;
      width: 38px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 2px solid #a2abb8;
      color: #697386;
      font-size: 16px;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.58);
    }

    .topic span {
      display: block;
      text-align: center;
      font-size: clamp(24px, 2.35vw, 34px);
      line-height: 1.16;
      font-weight: 800;
      letter-spacing: 0;
    }

    .question-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 42px;
      background: rgba(12, 18, 28, 0.42);
      backdrop-filter: blur(12px);
    }

    .question-overlay[hidden] {
      display: none;
    }

    .question-card {
      position: relative;
      overflow: hidden;
      width: min(1320px, 96vw);
      min-height: min(720px, 88vh);
      padding: clamp(28px, 4vw, 54px);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 22px;
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", Meiryo, sans-serif;
      background: rgba(255, 255, 255, 0.96);
      border: 4px solid var(--accent);
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.34);
    }

    .question-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .question-country {
      display: flex;
      align-items: center;
    }

    .question-country img {
      width: 86px;
      height: 48px;
      object-fit: contain;
    }

    .question-theme {
      color: #9a6a00;
      font-size: clamp(20px, 2vw, 30px);
      font-weight: 600;
      text-align: right;
    }

    .question-text {
      width: min(1160px, 100%);
      margin: 0;
      align-self: center;
      justify-self: center;
      color: var(--ink);
      font-size: clamp(36px, 5.1vw, 68px);
      line-height: 1.24;
      font-weight: 600;
      letter-spacing: 0;
      text-align: center;
    }

    .question-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
    }

    .question-actions button {
      min-width: 150px;
      height: 48px;
      font-size: 16px;
    }

    .detail-viewer {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 18px;
      padding: clamp(24px, 4vw, 52px);
      background: rgba(255, 255, 255, 0.98);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    .detail-viewer.is-visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .detail-close {
      justify-self: end;
      width: 46px;
      height: 46px;
      padding: 0;
      border-color: #cbd6e2;
      color: var(--ink);
      font-size: 30px;
      font-weight: 400;
      line-height: 1;
      background: #ffffff;
    }

    .detail-stage {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: transparent;
    }

    .detail-stage img {
      width: auto;
      height: 100%;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      background: #ffffff;
      box-shadow: 0 18px 48px rgba(23, 32, 51, 0.16);
    }

    .detail-placeholder {
      margin: 0;
      color: var(--muted);
      font-size: clamp(22px, 3vw, 36px);
      font-weight: 500;
      text-align: center;
    }

    @media (max-width: 900px) {
      .app {
        padding: 18px;
        gap: 18px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .countries {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .controls {
        justify-content: flex-start;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(6, minmax(110px, 1fr));
      }

      .question-overlay {
        padding: 18px;
      }

      .question-card {
        width: 96vw;
        min-height: 84vh;
        padding: 24px 18px;
      }

      .question-meta {
        align-items: flex-start;
        flex-direction: column;
      }

      .question-theme {
        text-align: left;
      }

      .question-actions {
        flex-direction: column;
      }

      .detail-viewer {
        padding: 18px;
      }
    }
  </style>
</head>

        <button id="detailButton" type="button">詳細</button>

      <div class="detail-viewer" id="detailViewer" aria-label="詳細画像">

    const gridEl = document.getElementById("themeGrid");

    const detailImage = document.getElementById("detailImage");
    const detailPlaceholder = document.getElementById("detailPlaceholder");

    function emptySelections() {
      return Object.fromEntries(countries.map((country) => [country.key, []]));
    }

    function loadSelections() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey));
        const base = emptySelections();
        for (const country of countries) {
          if (Array.isArray(parsed?.[country.key])) {
            base[country.key] = parsed[country.key].filter((value) => Number.isInteger(value));
          }
        }
        return base;
      } catch {
        return emptySelections();
      }
    }

    function saveSelections() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(selections));
      } catch {
        // Keep the live screen usable even if storage is blocked.
      }
    }

    function currentKey() {
      return countries[activeCountry].key;
    }

    function isDone(themeIndex) {
      return selections[currentKey()].includes(themeIndex);
    }

    function toggleTheme(themeIndex) {
      const key = currentKey();
      const selected = new Set(selections[key]);
      if (selected.has(themeIndex)) {
        selected.delete(themeIndex);
        activeQuestion = null;
        detailOpen = false;
      } else {
        selected.add(themeIndex);
        activeQuestion = {
          countryIndex: activeCountry,
          themeIndex,
          questionIndex: pickQuestionIndex(key, themeIndex),
        };
      }
      selections[key] = Array.from(selected).sort((a, b) => a - b);
      render();
      saveSelections();
    }

    function getQuestionEntry(countryKey, themeIndex) {
      const entry = questionBank[countryKey]?.[themeIndex] || questionBank.default[themeIndex];
      if (Array.isArray(entry)) {
        return entry;
      }
      return [entry];
    }

    function pickQuestionIndex(countryKey, themeIndex) {
      const entries = getQuestionEntry(countryKey, themeIndex);
      return Math.floor(Math.random() * entries.length);
    }

    function getQuestion(countryKey, themeIndex, questionIndex = 0) {
      const entries = getQuestionEntry(countryKey, themeIndex);
      const entry = entries[questionIndex] || entries[0];
      return typeof entry === "string" ? entry : entry.text;
    }

    function getQuestionObject(countryKey, themeIndex, questionIndex = 0) {
      const entries = getQuestionEntry(countryKey, themeIndex);
      const entry = entries[questionIndex] || entries[0];
      return typeof entry === "string" ? { text: entry } : entry;
    }

    function getDetailImage(countryKey, themeIndex, questionIndex = 0) {
      const questionEntry = getQuestionObject(countryKey, themeIndex, questionIndex);
      const countryImages = detailImageBank[countryKey] || {};
      const detailEntry =
        questionEntry.image ||
        countryImages[`${themeIndex}:${questionIndex}`] ||
        countryImages[themeIndex] ||
        detailImageBank.default[themeIndex];

      if (!detailEntry) {
        return null;
      }
      return typeof detailEntry === "string" ? { src: detailEntry, alt: "" } : detailEntry;
    }

    function hideQuestion() {
      activeQuestion = null;
      detailOpen = false;
      render();
    }

    function showDetail() {
      if (!activeQuestion) {
        return;
      }
      detailOpen = true;
      renderDetail();
    }

    function closeDetail() {
      detailOpen = false;
      renderDetail();
    }

    function handleThemePick(event) {
      const topicButton = event.target.closest(".topic");
      if (!topicButton || !gridEl.contains(topicButton)) {
        return;
      }
      const themeIndex = Number(topicButton.dataset.index);
      if (!Number.isInteger(themeIndex)) {
        return;
      }
      toggleTheme(themeIndex);
    }

    function setCountry(index) {
      activeCountry = ((index % countries.length) + countries.length) % countries.length;
      activeQuestion = null;
      detailOpen = false;
      render();
    }

    function nextCountry() {
      setCountry(activeCountry + 1);
    }

    function resetCountry() {
      selections[currentKey()] = [];
      render();
      saveSelections();
    }

    function resetAll() {
      selections = emptySelections();
      render();
      saveSelections();
    }

    function renderCountries() {
      countriesEl.replaceChildren();
      countries.forEach((country, index) => {
        const button = document.createElement("button");
        button.className = `country${index === activeCountry ? " active" : ""}`;
        button.type = "button";
        button.setAttribute("aria-label", country.name);
        button.addEventListener("click", () => setCountry(index));

        const img = document.createElement("img");
        img.src = country.flag;
        img.alt = `${country.name} flag`;
        button.append(img);
        countriesEl.append(button);
      });
    }

    function renderGrid() {
      gridEl.replaceChildren();
      themes.forEach((theme, index) => {
        const button = document.createElement("button");
        const isSpotlight =
          activeQuestion?.countryIndex === activeCountry && activeQuestion?.themeIndex === index;
        button.className = `topic${isDone(index) ? " done" : ""}${isSpotlight ? " spotlight" : ""}`;
        button.type = "button";
        button.dataset.index = String(index);
        button.setAttribute("aria-pressed", String(isDone(index)));

        const label = document.createElement("span");
        label.textContent = theme;
        button.append(label);
        gridEl.append(button);
      });
    }

    function renderProgress() {
      const count = selections[currentKey()].length;
      progressText.textContent = `${count} / ${themes.length}`;
    }

    function renderQuestion() {
      if (!activeQuestion) {
        questionOverlay.hidden = true;
        detailOpen = false;
        detailButton.hidden = true;
        renderDetail();
        return;
      }

      const country = countries[activeQuestion.countryIndex];
      const theme = themes[activeQuestion.themeIndex];
      questionFlag.src = country.flag;
      questionFlag.alt = `${country.name} flag`;
      questionTheme.textContent = theme;
      questionText.textContent = getQuestion(country.key, activeQuestion.themeIndex, activeQuestion.questionIndex);
      detailButton.hidden = !getDetailImage(country.key, activeQuestion.themeIndex, activeQuestion.questionIndex);
      if (detailButton.hidden) {
        detailOpen = false;
      }
      questionOverlay.hidden = false;
      renderDetail();
    }

    function renderDetail() {
      if (!detailOpen || !activeQuestion) {
        detailViewer.classList.remove("is-visible");
        detailImage.hidden = true;
        detailImage.removeAttribute("src");
        detailImage.alt = "";
        detailPlaceholder.hidden = false;
        return;
      }

      const country = countries[activeQuestion.countryIndex];
      const detail = getDetailImage(country.key, activeQuestion.themeIndex, activeQuestion.questionIndex);
      if (detail?.src) {
        detailImage.src = detail.src;
        detailImage.alt = detail.alt || `${themes[activeQuestion.themeIndex]} 詳細画像`;
        detailImage.hidden = false;
        detailPlaceholder.hidden = true;
      } else {
        detailImage.hidden = true;
        detailImage.removeAttribute("src");
        detailImage.alt = "";
        detailPlaceholder.hidden = false;
      }
      detailViewer.classList.add("is-visible");
    }

    function render() {
      renderCountries();
      renderGrid();
      renderProgress();
      renderQuestion();
    }

    document.getElementById("nextButton").addEventListener("click", nextCountry);
    document.getElementById("resetCountryButton").addEventListener("click", resetCountry);
    document.getElementById("resetAllButton").addEventListener("click", resetAll);
    gridEl.addEventListener("click", handleThemePick);
    document.getElementById("closeQuestionButton").addEventListener("click", hideQuestion);
    document.getElementById("detailButton").addEventListener("click", showDetail);
    document.getElementById("closeDetailButton").addEventListener("click", closeDetail);
    document.getElementById("questionNextButton").addEventListener("click", nextCountry);
    questionOverlay.addEventListener("click", (event) => {
      if (event.target === questionOverlay) {
        hideQuestion();
      }
    });
    document.getElementById("fullscreenButton").addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen?.();
      } else {
        document.exitFullscreen?.();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        nextCountry();
      }
      if (event.key === "ArrowLeft") {
        event.preventDefault();
        setCountry(activeCountry - 1);
      }
      if (["1", "2", "3", "4"].includes(event.key)) {
        setCountry(Number(event.key) - 1);
      }
      if (event.key.toLowerCase() === "r") {
        resetCountry();
      }
      if (event.key === "Escape") {
        if (detailOpen) {
          closeDetail();
        } else {
          hideQuestion();
        }
      }
    });

    render();
  </script>
</body>
</html>
